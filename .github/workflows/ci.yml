name: ci-cd

on:
  push:
    branches: ["main", "master"]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.10"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  structure-check:
    name: Structure Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate repository structure
        run: python scripts/check_repo_structure.py

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff lint
        run: ruff check .

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff formatter check
        run: ruff format --check .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest --cov=producer --cov=processor --cov=dashboard --cov-report=term-missing

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Bandit
        run: bandit -c pyproject.toml -r producer processor dashboard

  dependency-vulnerability:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pip-audit
        run: pip-audit

  build-producer-image:
    name: Build Producer Image
    runs-on: ubuntu-latest
    needs:
      - structure-check
      - lint
      - format
      - unit-tests
      - security-scan
      - dependency-vulnerability
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push producer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.producer
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/olist-kafka-analytics-producer:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/olist-kafka-analytics-producer:latest

  build-processor-image:
    name: Build Processor Image
    runs-on: ubuntu-latest
    needs: build-producer-image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push processor image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.processor
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/olist-kafka-analytics-processor:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/olist-kafka-analytics-processor:latest

  build-dashboard-image:
    name: Build Dashboard Image
    runs-on: ubuntu-latest
    needs: build-processor-image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/olist-kafka-analytics-dashboard:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/olist-kafka-analytics-dashboard:latest

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build-dashboard-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check staging secrets
        id: staging-secrets
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_GHCR_USERNAME: ${{ secrets.STAGING_GHCR_USERNAME }}
          STAGING_GHCR_TOKEN: ${{ secrets.STAGING_GHCR_TOKEN }}
          STAGING_DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
        run: |
          if [ -n "$STAGING_HOST" ] && \
             [ -n "$STAGING_USER" ] && \
             [ -n "$STAGING_SSH_KEY" ] && \
             [ -n "$STAGING_GHCR_USERNAME" ] && \
             [ -n "$STAGING_GHCR_TOKEN" ] && \
             [ -n "$STAGING_DEPLOY_PATH" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Staging secrets are missing. Skipping deployment."
          fi

      - name: Prepare SSH key
        if: steps.staging-secrets.outputs.should_deploy == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.STAGING_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy staging compose file
        if: steps.staging-secrets.outputs.should_deploy == 'true'
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "mkdir -p ${{ secrets.STAGING_DEPLOY_PATH }}"
          scp deploy/docker-compose.staging.yml ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:${{ secrets.STAGING_DEPLOY_PATH }}/docker-compose.staging.yml

      - name: Deploy staging stack
        if: steps.staging-secrets.outputs.should_deploy == 'true'
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "
            echo '${{ secrets.STAGING_GHCR_TOKEN }}' | docker login ghcr.io -u '${{ secrets.STAGING_GHCR_USERNAME }}' --password-stdin &&
            export GHCR_OWNER='${{ github.repository_owner }}' &&
            export IMAGE_TAG='${{ github.sha }}' &&
            docker compose -f '${{ secrets.STAGING_DEPLOY_PATH }}/docker-compose.staging.yml' pull &&
            docker compose -f '${{ secrets.STAGING_DEPLOY_PATH }}/docker-compose.staging.yml' up -d
          "
